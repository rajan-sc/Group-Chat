<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="auth-container">
        <h1>Chat</h1>

        <div id="auth-forms">
            <div id="login-section">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group">
                        <input type="email" id="login-email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit">Sign In</button>
                </form>
                <p class="auth-links">Don't have an account? <a href="#" id="show-register">Create one</a></p>
            </div>

            <div id="register-section" class="hidden">
                <h2>Create Account</h2>
                <form id="register-form">
                    <div class="form-group">
                        <input type="text" id="register-name" placeholder="Full Name" required>
                    </div>
                    <div class="form-group">
                        <input type="email" id="register-email" placeholder="Email Address" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="register-password" placeholder="Password" required>
                    </div>
                    <button type="submit">Register</button>
                </form>
                <p class="auth-links">Already have an account? <a href="#" id="show-login">Sign in</a></p>
            </div>
        </div>
    </div>

    <script src="/js/auth.js"></script>
</body>
</html>
